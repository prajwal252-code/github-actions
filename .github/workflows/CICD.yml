#This is a Demo CICD pipeline yml file.

name: CICD Workflow

on:
  workflow_dispatch: 
    inputs:
      environment:
        description: This is New WF
        default: 'Build'
        required: true
        type: choice
        options:
          - Build
          - Test
          - Dev

jobs:

  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Build an Image
        run: echo "Image Build"

  Test:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Testing
        run: echo "Testing Done"

  Deploy: 
    if: inputs.environment == 'Dev'
    needs: [Build, Test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo "Deployment Done"
